<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLANTOS — операционная для домашних растений</title>
  <meta name="description" content="Магазин комнатных растений PLANTOS. Каталог с фильтром по свету и уходу, доставка по РФ." />
  <style>
    :root {
      --bone: #f2efe6;
      --paper: #fbfaf5;
      --ink: #14170f;
      --forest: #1c3a2a;
      --forest-2: #274d38;
      --lime: #c8ff4d;
      --line: #d7d3c6;
      --muted: #6f6e63;
      --danger: #b23b2e;
      --sb: 248px;
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Roboto Mono", Menlo, monospace;
      --sans: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bone);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      line-height: 1.45;
    }
    button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
    input, select, textarea { font-family: inherit; }
    a { color: inherit; }

    .mono { font-family: var(--mono); }
    .tag {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ---- topbar ---- */
    .topbar {
      position: sticky; top: 0; z-index: 40;
      display: flex; align-items: stretch;
      border-bottom: 1px solid var(--ink);
      background: rgba(242, 239, 230, 0.85); /* var(--bone) with opacity */
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .brand {
      display: flex; align-items: baseline; gap: 12px;
      padding: 16px 20px;
      border-right: 1px solid var(--ink);
      min-width: var(--sb);
    }
    .brand b {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.14em;
    }
    .brand span { font-size: 11px; color: var(--muted); }
    .topbar-mid {
      flex: 1; display: flex; align-items: center; gap: 20px;
      padding: 0 20px; font-size: 12px; color: var(--muted);
    }
    .topbar-mid .dot { width: 6px; height: 6px; background: var(--forest); }
    .cart-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 0 22px;
      border-left: 1px solid var(--ink);
      background: var(--ink); color: var(--bone);
      font-family: var(--mono); font-size: 13px;
      letter-spacing: 0.04em;
      transition: background .15s, transform .15s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .cart-btn:hover { background: var(--forest); }
    .cart-btn:active { transform: scale(0.95); }
    .cart-btn .count {
      background: var(--lime); color: var(--ink);
      min-width: 22px; height: 22px; padding: 0 6px;
      display: grid; place-items: center;
      font-weight: 700; font-size: 12px;
    }

    /* ---- shell ---- */
    .shell { display: flex; align-items: flex-start; }
    .sidebar {
      position: sticky; top: 57px;
      width: var(--sb); flex: none;
      height: calc(100vh - 57px);
      overflow-y: auto;
      border-right: 1px solid var(--ink);
      padding: 22px 20px 40px;
      background: rgba(242, 239, 230, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .fgroup { margin-bottom: 26px; }
    .fgroup h4 {
      margin: 0 0 12px; font-family: var(--mono);
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--ink);
      display: flex; justify-content: space-between; align-items: center;
    }
    .fgroup h4 em { color: var(--muted); font-style: normal; }
    .opt {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; text-align: left;
      padding: 9px 12px; margin-bottom: 6px;
      border: 1px solid var(--line);
      font-size: 13px; background: var(--paper);
      transition: all .12s;
    }
    .opt:hover { border-color: var(--ink); }
    .opt.on { background: var(--forest); color: var(--bone); border-color: var(--forest); }
    .opt .n { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .opt.on .n { color: var(--lime); }
    .reset {
      width: 100%; padding: 10px; margin-top: 4px;
      border: 1px solid var(--ink); font-family: var(--mono);
      font-size: 12px; letter-spacing: 0.04em; background: var(--bone);
    }
    .reset:hover { background: var(--ink); color: var(--bone); }
    .reset:disabled { opacity: .4; cursor: default; }
    .reset:disabled:hover { background: var(--bone); color: var(--ink); }

    /* ---- main ---- */
    .main { flex: 1; min-width: 0; }
    .rowbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; border-bottom: 1px solid var(--line);
      flex-wrap: wrap; gap: 12px;
    }
    .rowbar .count-lbl { font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em; }
    .rowbar .count-lbl b { color: var(--forest); }
    .sortsel {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--mono); font-size: 12px; color: var(--muted);
    }
    .sortsel select {
      border: 1px solid var(--ink); background: var(--paper);
      padding: 7px 10px; font-size: 12px; font-family: var(--mono);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(238px, 1fr));
      gap: 1px; background: var(--line);
      border-bottom: 1px solid var(--line);
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card {
      background: var(--paper); border: 0;
      display: flex; flex-direction: column; text-align: left;
      position: relative; 
      transition: transform .3s cubic-bezier(0.2, 0.8, 0.2, 1), background .15s, box-shadow .3s cubic-bezier(0.2, 0.8, 0.2, 1);
      animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
    }
    /* Staggered animation for children in grid */
    .grid .card:nth-child(1) { animation-delay: 0.05s; }
    .grid .card:nth-child(2) { animation-delay: 0.10s; }
    .grid .card:nth-child(3) { animation-delay: 0.15s; }
    .grid .card:nth-child(4) { animation-delay: 0.20s; }
    .grid .card:nth-child(5) { animation-delay: 0.25s; }
    .grid .card:nth-child(6) { animation-delay: 0.30s; }
    .grid .card:nth-child(7) { animation-delay: 0.35s; }
    .grid .card:nth-child(8) { animation-delay: 0.40s; }
    .grid .card:nth-child(9) { animation-delay: 0.45s; }
    .grid .card:nth-child(10) { animation-delay: 0.50s; }
    .grid .card:nth-child(11) { animation-delay: 0.55s; }
    .grid .card:nth-child(12) { animation-delay: 0.60s; }
    .card {
      background: var(--paper); border: 0;
      display: flex; flex-direction: column; text-align: left;
      position: relative; transition: background .15s;
    }
    .card:hover { 
      background: #fff; 
      transform: translateY(-4px); 
      box-shadow: 0 12px 24px rgba(20,23,15,0.08); 
      z-index: 10;
    }
    .card-figure {
      aspect-ratio: 4 / 3;
      display: grid; place-items: center;
      background: var(--bone);
      border-bottom: 1px solid var(--line);
      overflow: hidden;
      position: relative;
    }
    .card-figure img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .card:hover .card-figure img {
      transform: scale(1.05);
    }
    .card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; flex-grow: 1; }
    .card-code {
      font-family: var(--mono); font-size: 11px;
      letter-spacing: 0.08em; color: var(--muted);
      display: flex; justify-content: space-between;
    }
    .card-name { font-size: 17px; font-weight: 600; margin: 6px 0 2px; letter-spacing: -0.01em; }
    .card-latin { font-style: italic; font-size: 12.5px; color: var(--muted); }
    .card-foot {
      display: flex; align-items: flex-end; justify-content: space-between; gap: 8px;
      margin-top: auto;
    }
    .price { font-family: var(--mono); font-size: 16px; font-weight: 700; min-width: 0; line-height: 1.1; }
    .price em { display: block; font-style: normal; font-size: 11px; color: var(--muted); font-weight: 400; line-height: 1.4; margin-top: 6px; min-height: 31px; }
    .add {
      flex-shrink: 0;
      padding: 8px 14px; border: 1px solid var(--ink);
      font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em;
      background: var(--ink); color: var(--bone); transition: all .12s;
    }
    .add:hover { background: var(--lime); color: var(--ink); border-color: var(--ink); }
    .add.added { background: var(--forest); border-color: var(--forest); color: var(--lime); }
    .difficulty-pill {
      position: absolute; top: 0; left: 0;
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 5px 9px;
      background: var(--paper); border-right: 1px solid var(--line); border-bottom: 1px solid var(--line);
      color: var(--muted);
    }

    .empty { padding: 80px 24px; text-align: center; color: var(--muted); }
    .empty b { display: block; font-size: 18px; color: var(--ink); margin-bottom: 8px; }

    .site-foot {
      padding: 30px 24px; border-top: 1px solid var(--ink);
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px;
      font-family: var(--mono); font-size: 12px; color: var(--muted);
    }

    /* ---- drawer / modal shared ---- */
    .overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(20,23,15,.42);
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }

    .drawer {
      position: fixed; top: 0; right: 0; z-index: 60;
      width: 420px; max-width: 92vw; height: 100vh;
      background: var(--bone); border-left: 1px solid var(--ink);
      transform: translateX(100%); transition: transform .4s cubic-bezier(0.2, 0.8, 0.2, 1);
      display: flex; flex-direction: column;
      box-shadow: -10px 0 30px rgba(0,0,0,0.1);
    }
    .drawer.show { transform: translateX(0); }
    .drawer-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px; border-bottom: 1px solid var(--ink);
    }
    .drawer-head b { font-family: var(--mono); letter-spacing: 0.08em; font-size: 14px; }
    .x { font-family: var(--mono); font-size: 18px; padding: 4px 8px; }
    .x:hover { color: var(--danger); }
    .drawer-body { flex: 1; overflow-y: auto; padding: 8px 20px; }

    .line-item { display: flex; gap: 14px; padding: 16px 0; border-bottom: 1px solid var(--line); }
    .line-item .li-fig {
      width: 60px; height: 60px; flex: none; background: var(--paper);
      border: 1px solid var(--line); display: grid; place-items: center;
      overflow: hidden;
    }
    .li-main { flex: 1; min-width: 0; }
    .li-main .li-name { font-weight: 600; font-size: 14px; }
    .li-main .li-code { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .qty { display: inline-flex; border: 1px solid var(--ink); margin-top: 8px; }
    .qty button { width: 28px; height: 28px; font-family: var(--mono); font-size: 14px; }
    .qty button:hover { background: var(--ink); color: var(--bone); }
    .qty span { min-width: 34px; display: grid; place-items: center; font-family: var(--mono); font-size: 13px; border-left: 1px solid var(--ink); border-right: 1px solid var(--ink); }
    .li-price { font-family: var(--mono); font-weight: 700; font-size: 14px; text-align: right; }
    .li-remove { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 8px; }
    .li-remove:hover { color: var(--danger); }

    .drawer-foot { border-top: 1px solid var(--ink); padding: 18px 20px; }
    .sumline { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 13px; margin-bottom: 8px; }
    .sumline.total { font-size: 17px; font-weight: 700; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }
    .btn-primary {
      width: 100%; padding: 15px; margin-top: 14px;
      background: var(--ink); color: var(--bone);
      font-family: var(--mono); font-size: 13px; letter-spacing: 0.06em;
      border: 1px solid var(--ink); transition: all .14s;
    }
    .btn-primary:hover { background: var(--lime); color: var(--ink); }
    .btn-ghost {
      width: 100%; padding: 13px; margin-top: 10px;
      border: 1px solid var(--ink); font-family: var(--mono); font-size: 12px;
      background: transparent;
    }
    .btn-ghost:hover { background: var(--ink); color: var(--bone); }

    .cart-empty { padding: 60px 10px; text-align: center; color: var(--muted); }
    .cart-empty .leaf-mark { width: 64px; height: 64px; margin: 0 auto 18px; opacity: .5; }

    /* ---- checkout form ---- */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .field input, .field textarea, .field select {
      width: 100%; padding: 11px 12px; border: 1px solid var(--line);
      background: var(--paper); font-size: 14px;
    }
    .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--ink); }
    .field.err input, .field.err textarea, .field.err select { border-color: var(--danger); background: #fbeae7; }
    .field .msg { font-size: 11.5px; color: var(--danger); margin-top: 5px; font-family: var(--mono); min-height: 0; }
    .two { display: flex; gap: 12px; }
    .two .field { flex: 1; }
    .pay-note { font-size: 11.5px; color: var(--muted); margin-top: 6px; line-height: 1.5; }

    .ok-screen { padding: 50px 24px; text-align: center; }
    .ok-screen .ok-mark { width: 68px; height: 68px; margin: 0 auto 20px; border: 2px solid var(--forest); border-radius: 50%; display: grid; place-items: center; }
    .ok-screen .ok-mark svg { width: 34px; height: 34px; }
    .ok-screen h3 { font-family: var(--mono); letter-spacing: 0.04em; margin: 0 0 10px; }
    .ok-screen .order-id { font-family: var(--mono); font-size: 13px; color: var(--forest); background: var(--paper); border: 1px solid var(--line); display: inline-block; padding: 6px 14px; margin: 8px 0 18px; }

    /* ---- product modal ---- */
    .modal {
      position: fixed; z-index: 60; top: 50%; left: 50%;
      transform: translate(-50%, -48%) scale(0.96); opacity: 0; pointer-events: none;
      width: 720px; max-width: 94vw; max-height: 90vh; overflow: auto;
      background: var(--bone); border: 1px solid var(--ink);
      transition: opacity .3s cubic-bezier(0.2, 0.8, 0.2, 1), transform .3s cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }
    .modal.show { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; }
    .modal-fig { aspect-ratio: 1; background: var(--bone); display: grid; place-items: center; border-right: 1px solid var(--ink); overflow: hidden; }
    .modal-info { padding: 26px 26px 28px; display: flex; flex-direction: column; }
    .modal-info .m-code { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.08em; }
    .modal-info h2 { margin: 8px 0 2px; font-size: 26px; letter-spacing: -0.02em; }
    .modal-info .m-latin { font-style: italic; color: var(--muted); margin-bottom: 16px; }
    .specs { border-top: 1px solid var(--line); margin: 6px 0 18px; }
    .spec { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
    .spec .k { font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); }
    .m-desc { font-size: 14px; color: #3a3a30; margin-bottom: 20px; flex: 1; }
    .m-foot { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .m-foot .price { font-size: 22px; }

    .toast {
      position: fixed; z-index: 80; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px); opacity: 0;
      background: var(--ink); color: var(--bone);
      padding: 13px 22px; font-family: var(--mono); font-size: 13px;
      display: flex; align-items: center; gap: 12px;
      transition: opacity .3s cubic-bezier(0.2, 0.8, 0.2, 1), transform .3s cubic-bezier(0.2, 0.8, 0.2, 1); 
      pointer-events: none;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      border-radius: 4px;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast .tdot { width: 8px; height: 8px; background: var(--lime); }

    /* ---- responsive ---- */
    .menu-btn { display: none; }
    @media (max-width: 860px) {
      :root { --sb: 210px; }
      .brand { min-width: auto; }
      .brand span { display: none; }
      .topbar-mid { display: none; }
      .sidebar {
        position: fixed; top: 57px; left: 0; z-index: 45;
        transform: translateX(-100%); transition: transform .22s;
        background: var(--bone); width: 260px;
      }
      .sidebar.open { transform: translateX(0); }
      .menu-btn {
        display: flex; align-items: center; gap: 8px;
        padding: 0 18px; border-right: 1px solid var(--ink);
        font-family: var(--mono); font-size: 12px;
      }
      .modal-grid { grid-template-columns: 1fr; }
      .modal-fig { aspect-ratio: 16/9; border-right: 0; border-bottom: 1px solid var(--ink); }
    }
    @media (max-width: 520px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .card-name { font-size: 15px; }
      .cart-btn { padding: 0 14px; }
      .cart-btn .cart-total { display: none; }
    }
    .fav-btn {
      position: absolute; top: 10px; right: 10px; z-index: 3;
      width: 34px; height: 34px; border: 1px solid var(--line);
      background: var(--paper); color: var(--muted);
      font-size: 17px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color .2s, border-color .2s, transform .15s;
    }
    .fav-btn:hover { border-color: var(--forest); color: var(--forest); }
    .fav-btn.on { color: var(--forest); border-color: var(--forest); }
    .fav-btn.on:active, .fav-btn:active { transform: scale(.88); }
    .card-figure { overflow: hidden; }
    .card-figure img { transition: transform .6s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .card:hover .card-figure img { transform: scale(1.06); }
    @keyframes favpop { 0% { transform: scale(1); } 45% { transform: scale(1.3); } 100% { transform: scale(1); } }
    .fav-btn.on { animation: favpop .35s ease; }
    @media (prefers-reduced-motion: reduce) {
      .card-figure img { transition: none; }
      .fav-btn.on { animation: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
